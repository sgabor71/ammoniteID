<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — AmmoniteID</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --deep-green: #2c5f2d; --accent: #e67e22; --light-bg: #f9f9f4; }
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, var(--deep-green) 0%, #1e4620 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }
        .logo {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        h1 {
            text-align: center;
            color: var(--deep-green);
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #999;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: bold;
            font-size: 0.95rem;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: Arial, sans-serif;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--deep-green);
            box-shadow: 0 0 0 3px rgba(44, 95, 45, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--deep-green);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background: #1e4620;
        }
        .btn-login:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 44px; }
        .toggle-pwd {
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            font-size: 1.1rem; color: #999; padding: 0; width: auto;
        }
        .toggle-pwd:hover { color: #333; }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: var(--deep-green);
            text-decoration: none;
            font-weight: bold;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🐚</div>
        <h1>Admin Access</h1>
        <p class="subtitle">AmmoniteID Administration Panel</p>

        <div class="error" id="errorMsg"></div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                <button type="button" class="toggle-pwd" onclick="togglePwd()">👁️</button>
            </div>
        </div>

        <button class="btn-login" id="loginBtn" onclick="handleLogin()">
            Sign In as Admin
        </button>

        <div class="back-link">
            <a href="/static/home.html">← Back to Home</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyChXqOpXgpkLrn44mfIcPoTVPBk6neicBQ",
            authDomain: "ammoniteid-f9d8e.firebaseapp.com",
            projectId: "ammoniteid-f9d8e",
            appId: "1:828376677091:web:e302f3ff538b78bc83e3d6"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(app);

        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');

        function togglePwd() {
            const input = document.getElementById('password');
            const btn = document.querySelector('.toggle-pwd');
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        }

        async function handleLogin() {
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showError('Email and password required');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span>Signing in...';
            errorMsg.style.display = 'none';

            try {
                // Sign in with Firebase
                const userCred = await auth.signInWithEmailAndPassword(email, password);
                const uid = userCred.user.uid;
                const token = await userCred.user.getIdToken();

                // Check if user is admin
                const res = await fetch(`/api/auth/admin-check/${uid}`);
                const data = await res.json();

                if (!data.is_admin) {
                    // Not an admin
                    await auth.signOut();
                    showError('Access denied. You do not have admin privileges.');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign In as Admin';
                    return;
                }

                // Admin — store auth state and redirect
                localStorage.setItem('admin_uid', uid);
                localStorage.setItem('admin_token', token);
                window.location.href = '/static/admin.html';

            } catch (error) {
                let message = 'Login failed';
                if (error.code === 'auth/user-not-found') message = 'Email not found';
                if (error.code === 'auth/wrong-password') message = 'Incorrect password';
                if (error.code === 'auth/invalid-email') message = 'Invalid email';
                showError(message);
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In as Admin';
            }
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }

        // Allow Enter key to submit
        [emailInput, passwordInput].forEach(el => {
            el.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleLogin();
            });
        });
    </script>
</body>
</html>
