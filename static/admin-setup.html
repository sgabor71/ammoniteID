<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Setup — AmmoniteID</title>
    <link rel="stylesheet" href="/static/responsive-mobile.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --deep-green: #2c5f2d; --accent: #e67e22; }
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, var(--deep-green) 0%, #1e4620 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        /* Navigation Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            box-shadow: 0 2px 8px rgba(61, 48, 39, 0.1);
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .header-logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2c5f2d;
            text-decoration: none;
        }

        .hamburger-btn {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
        }

        .hamburger-btn span {
            width: 25px;
            height: 3px;
            background: #2c5f2d;
            border-radius: 3px;
            transition: all 0.3s;
        }

        header nav {
            display: flex;
            gap: 1.2rem;
            align-items: center;
        }

        header nav a {
            color: #5D4E3A;
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s;
            padding-bottom: 3px;
            border-bottom: 3px solid transparent;
        }

        header nav a:hover {
            color: #2c5f2d;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 450px;
            width: 100%;
            margin-top: 80px;
        }
        .logo {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        h1 {
            text-align: center;
            color: var(--deep-green);
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #999;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: bold;
            font-size: 0.95rem;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: Arial, sans-serif;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--deep-green);
            box-shadow: 0 0 0 3px rgba(44, 95, 45, 0.1);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--deep-green);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #1e4620;
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .btn-danger {
            background: #c62828;
        }
        .btn-danger:hover {
            background: #b71c1c;
        }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
        .success {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 44px;
        }
        .toggle-pwd {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            color: #999;
            padding: 0;
            width: auto;
        }
        .toggle-pwd:hover { color: #333; }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: var(--deep-green);
            text-decoration: none;
            font-weight: bold;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .info-box {
            background: #f0f8f0;
            border-left: 4px solid var(--deep-green);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #333;
        }
        .divider {
            text-align: center;
            color: #ccc;
            margin: 25px 0;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .container {
                margin-top: 100px;
                padding: 30px 20px;
            }
            .hamburger-btn {
                display: flex;
            }
            header nav {
                display: none;
                width: 100%;
                flex-direction: column;
                gap: 1rem;
                padding: 1rem 0;
            }
            header nav.show {
                display: flex;
            }
            header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="/static/home.html" class="header-logo">🐚 AmmoniteID</a>
        <button class="hamburger-btn">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav>
            <a href="/static/home.html">Home</a>
            <a href="/static/test.html">Identify</a>
            <a href="/static/mylog.html">My Fossil Collection</a>
            <a href="/static/about.html">About</a>
            <a href="/static/contact.html">Contact</a>
            <a href="/static/partners.html">Partners</a>
        </nav>
    </header>

    <div class="container">
        <div class="logo">🐚</div>
        <h1 id="pageTitle">Admin Setup</h1>
        <p class="subtitle" id="pageSubtitle">AmmoniteID Administration</p>

        <div class="error" id="errorMsg"></div>
        <div class="success" id="successMsg"></div>
        <div class="info-box" id="infoBox"></div>

        <!-- First Admin Setup Form -->
        <div id="firstAdminSection">
            <div class="form-group">
                <label for="firstEmail">Admin Email</label>
                <input type="email" id="firstEmail" placeholder="your@email.com" autocomplete="email">
            </div>

            <div class="form-group">
                <label for="firstPassword">Create Password</label>
                <div class="password-wrapper">
                    <input type="password" id="firstPassword" placeholder="••••••••" autocomplete="new-password">
                    <button type="button" class="toggle-pwd" onclick="togglePwd('firstPassword', this)">👁️</button>
                </div>
            </div>

            <div class="form-group">
                <label for="firstConfirm">Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" id="firstConfirm" placeholder="••••••••" autocomplete="new-password">
                    <button type="button" class="toggle-pwd" onclick="togglePwd('firstConfirm', this)">👁️</button>
                </div>
            </div>

            <button class="btn" id="createFirstBtn" onclick="createFirstAdmin()">
                Create First Admin Account
            </button>
        </div>

        <!-- Add More Admins Form (shown after login) -->
        <div id="addAdminSection" style="display:none;">
            <div class="info-box">
                ✅ You're logged in as admin. Add more admin users below.
            </div>

            <div class="form-group">
                <label for="newAdminEmail">New Admin Email</label>
                <input type="email" id="newAdminEmail" placeholder="newadmin@email.com" autocomplete="email">
            </div>

            <div class="form-group">
                <label for="newAdminPassword">Temporary Password</label>
                <div class="password-wrapper">
                    <input type="password" id="newAdminPassword" placeholder="••••••••" autocomplete="new-password">
                    <button type="button" class="toggle-pwd" onclick="togglePwd('newAdminPassword', this)">👁️</button>
                </div>
            </div>

            <button class="btn" id="addAdminBtn" onclick="addAdminUser()">
                Add New Admin
            </button>

            <div class="divider">OR</div>

            <button class="btn btn-danger" onclick="adminLogoutSetup()">
                Log Out & Go Home
            </button>
        </div>

        <div class="back-link">
            <a href="/static/home.html">← Back to Home</a>
        </div>
    </div>

    <script src="/static/hamburger-menu.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyChXqOpXgpkLrn44mfIcPoTVPBk6neicBQ",
            authDomain: "ammoniteid-f9d8e.firebaseapp.com",
            projectId: "ammoniteid-f9d8e",
            appId: "1:828376677091:web:e302f3ff538b78bc83e3d6"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(app);

        let _adminExists = false;
        let _currentUser = null;

        async function initPage() {
            // ── CHECK IF ALREADY LOGGED IN AS ADMIN ──────────
            // Method 1: Check localStorage
            const existingUid = localStorage.getItem('admin_uid');
            if (existingUid) {
                try {
                    const res = await fetch(`/api/auth/admin-check/${existingUid}`);
                    const data = await res.json();
                    if (data.is_admin) {
                        window.location.href = '/static/admin.html';
                        return;
                    }
                } catch (e) {
                    localStorage.removeItem('admin_uid');
                    localStorage.removeItem('admin_token');
                }
            }

            // ── CHECK IF ANY ADMIN EXISTS ─────────────────────
            try {
                const res = await fetch('/api/auth/admin-check/check-any');
                const data = await res.json();
                _adminExists = data.exists || false;
            } catch (e) {
                _adminExists = false;
            }

            // Method 2: Check Firebase auth state
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    _currentUser = user;
                    try {
                        const res = await fetch(`/api/auth/admin-check/${user.uid}`);
                        const data = await res.json();

                        if (data.is_admin) {
                            // Store UID and redirect
                            localStorage.setItem('admin_uid', user.uid);
                            window.location.href = '/static/admin.html';
                            return;
                        }
                    } catch (e) { /* continue */ }

                    // User exists but not admin
                    if (_adminExists) {
                        showLoginForm();
                    } else {
                        showFirstAdminForm();
                    }
                } else {
                    _currentUser = null;
                    if (_adminExists) {
                        showLoginForm();
                    } else {
                        showFirstAdminForm();
                    }
                }
            });
        }

        function showFirstAdminForm() {
            document.getElementById('pageTitle').textContent = 'Create First Admin';
            document.getElementById('pageSubtitle').textContent = 'Set up your admin account';
            document.getElementById('infoBox').innerHTML = '📝 Create your first admin account to access the admin panel.';
            document.getElementById('firstAdminSection').style.display = 'block';
            document.getElementById('addAdminSection').style.display = 'none';
        }

        function showLoginForm() {
            document.getElementById('pageTitle').textContent = 'Admin Login';
            document.getElementById('pageSubtitle').textContent = 'Or create first admin';
            document.getElementById('infoBox').innerHTML = '🔒 Admins already exist. Log in below, or go back to home.';
            
            // Replace first admin form with login form
            document.getElementById('firstAdminSection').innerHTML = `
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
                        <button type="button" class="toggle-pwd" onclick="togglePwd('loginPassword', this)">👁️</button>
                    </div>
                </div>
                <button class="btn" onclick="adminLogin()">Sign In as Admin</button>
            `;
        }

        function showAddAdminForm() {
            document.getElementById('pageTitle').textContent = 'Admin Setup';
            document.getElementById('pageSubtitle').textContent = 'Manage admin accounts';
            document.getElementById('infoBox').innerHTML = '✅ Logged in as admin';
            document.getElementById('firstAdminSection').style.display = 'none';
            document.getElementById('addAdminSection').style.display = 'block';
        }

        async function createFirstAdmin() {
            const email = document.getElementById('firstEmail').value.trim();
            const pwd = document.getElementById('firstPassword').value;
            const confirm = document.getElementById('firstConfirm').value;

            if (!email || !pwd || !confirm) {
                showError('All fields required');
                return;
            }
            if (pwd !== confirm) {
                showError('Passwords do not match');
                return;
            }
            if (pwd.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }

            const btn = document.getElementById('createFirstBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Creating...';
            clearMessages();

            try {
                // Step 1: Create Firebase account OR sign in if exists
                let cred;
                try {
                    cred = await auth.createUserWithEmailAndPassword(email, pwd);
                } catch (firebaseErr) {
                    if (firebaseErr.code === 'auth/email-already-in-use') {
                        // Account exists — try signing in instead
                        try {
                            cred = await auth.signInWithEmailAndPassword(email, pwd);
                        } catch (loginErr) {
                            throw new Error('Account exists but password is incorrect. Try again.');
                        }
                    } else if (firebaseErr.code === 'auth/invalid-email') {
                        throw new Error('Invalid email address');
                    } else if (firebaseErr.code === 'auth/weak-password') {
                        throw new Error('Password must be at least 6 characters');
                    } else {
                        throw new Error(firebaseErr.message || firebaseErr.code);
                    }
                }

                const uid = cred.user.uid;
                const userEmail = cred.user.email;

                // Step 2: Sync user to database
                await fetch('/api/auth/sync', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        uid: uid,
                        email: userEmail,
                        display_name: userEmail.split('@')[0]
                    })
                });

                // Step 3: Promote to admin
                const res = await fetch(`/api/auth/promote-admin/${uid}`, {
                    method: 'POST',
                    headers: { 'secret-key': 'ammonite-admin-setup' }
                });

                if (res.ok) {
                    showSuccess('✅ Admin account created! Redirecting...');
                    localStorage.setItem('admin_uid', uid);
                    setTimeout(() => {
                        window.location.href = '/static/admin.html';
                    }, 1500);
                } else {
                    const data = await res.json();
                    throw new Error('Promote failed: ' + (data.detail || 'Unknown error'));
                }
            } catch (error) {
                showError(error.message);
                btn.disabled = false;
                btn.textContent = 'Create First Admin Account';
            }
        }

        async function adminLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const pwd = document.getElementById('loginPassword').value;

            if (!email || !pwd) {
                showError('Email and password required');
                return;
            }

            const btn = document.querySelector('#firstAdminSection .btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Signing in...';
            clearMessages();

            try {
                const cred = await auth.signInWithEmailAndPassword(email, pwd);
                const uid = cred.user.uid;

                // Check admin status
                const res = await fetch(`/api/auth/admin-check/${uid}`);
                const data = await res.json();

                if (data.is_admin) {
                    localStorage.setItem('admin_uid', uid);
                    showSuccess('✅ Login successful!');
                    setTimeout(() => {
                        window.location.href = '/static/admin.html';
                    }, 1000);
                } else {
                    await auth.signOut();
                    showError('You do not have admin privileges');
                    btn.disabled = false;
                    btn.innerHTML = 'Sign In as Admin';
                }
            } catch (error) {
                let msg = 'Login failed';
                if (error.code === 'auth/user-not-found') msg = 'Email not found';
                if (error.code === 'auth/wrong-password') msg = 'Incorrect password';
                showError(msg);
                btn.disabled = false;
                btn.innerHTML = 'Sign In as Admin';
            }
        }

        async function addAdminUser() {
            if (!_currentUser) {
                showError('Not logged in');
                return;
            }

            const email = document.getElementById('newAdminEmail').value.trim();
            const pwd = document.getElementById('newAdminPassword').value;

            if (!email || !pwd) {
                showError('Email and password required');
                return;
            }

            const btn = document.getElementById('addAdminBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Adding...';
            clearMessages();

            try {
                // Create Firebase account (as current admin)
                const cred = await auth.createUserWithEmailAndPassword(email, pwd);
                const newUid = cred.user.uid;

                // Promote to admin
                const res = await fetch(`/api/auth/promote-admin/${newUid}`, {
                    method: 'POST',
                    headers: { 'secret-key': 'ammonite-admin-setup' }
                });

                if (res.ok) {
                    showSuccess(`✅ ${email} added as admin!`);
                    document.getElementById('newAdminEmail').value = '';
                    document.getElementById('newAdminPassword').value = '';
                    btn.disabled = false;
                    btn.textContent = 'Add New Admin';
                } else {
                    showError('Could not add admin');
                    btn.disabled = false;
                    btn.textContent = 'Add New Admin';
                }
            } catch (error) {
                let msg = 'Failed to add admin';
                if (error.code === 'auth/email-already-in-use') msg = 'Email already registered';
                showError(msg);
                btn.disabled = false;
                btn.textContent = 'Add New Admin';
            }
        }

        function adminLogoutSetup() {
            auth.signOut();
            window.location.href = '/static/home.html';
        }

        function togglePwd(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function clearMessages() {
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successMsg').style.display = 'none';
        }

        // Init on load
        initPage();
    </script>
</body>
</html>
