<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmmoniteID - Test Identification</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-section {
            margin: 30px 0;
        }

        .upload-box {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-box:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-box.drag-over {
            border-color: #764ba2;
            background: #e8ebff;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #333;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .upload-hint {
            color: #999;
            font-size: 13px;
        }

        #photoInput {
            display: none;
        }

        .photos-preview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .photo-item {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 1;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-remove {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-identify {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
        }

        .btn-identify:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-identify:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-clear {
            background: #f0f0f0;
            color: #333;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        .result {
            background: #f9f9f9;
            border-radius: 15px;
            padding: 25px;
            margin-top: 30px;
            border-left: 5px solid #667eea;
        }

        .result h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .result-item {
            margin: 12px 0;
            padding: 10px;
            background: white;
            border-radius: 8px;
            font-size: 14px;
        }

        .result-label {
            color: #666;
            font-weight: 600;
        }

        .result-value {
            color: #333;
            margin-left: 10px;
        }

        .loading {
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            border-left: 4px solid #c33;
        }

        /* LOGIN MODAL */
        .login-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .login-modal.show {
            display: flex;
        }

        .login-modal-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-modal-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .login-modal-title {
            color: #333;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .login-modal-message {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .login-modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            border: none;
            flex: 1;
            min-width: 110px;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-signup {
            background: #f0f0f0;
            color: #333;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            border: none;
            flex: 1;
            min-width: 110px;
            transition: all 0.3s ease;
        }

        .btn-signup:hover {
            background: #e0e0e0;
        }

        .btn-home {
            background: white;
            color: #667eea;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid #667eea;
            flex: 1;
            min-width: 110px;
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            background: #f0f2ff;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 22px;
            }

            .upload-box {
                padding: 25px;
            }

            .upload-icon {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <!-- LOGIN REQUIRED MODAL -->
    <div id="loginModal" class="login-modal">
        <div class="login-modal-content">
            <div class="login-modal-icon">🔐</div>
            <div class="login-modal-title">Login Required</div>
            <div class="login-modal-message">
                Please log in or sign up to identify fossils.
            </div>
            <div class="login-modal-buttons">
                <a href="/static/home.html" class="btn-home">Home</a>
                <a href="/static/login.html" class="btn-login">Log In</a>
                <a href="/static/login.html" class="btn-signup">Sign Up</a>
            </div>
        </div>
    </div>

    <div class="container">
        <h1>🦪 Identify Your Fossil</h1>
        <p class="subtitle">Upload 1-3 photos of your ammonite specimen for instant AI identification</p>

        <div class="upload-section">
            <div class="upload-box" id="uploadBox">
                <div class="upload-icon">📸</div>
                <div class="upload-text">Click to upload or drag & drop</div>
                <div class="upload-hint">JPG, PNG, or WebP (max 10MB each)</div>
            </div>
            <input type="file" id="photoInput" accept="image/*" multiple>

            <div class="photos-preview" id="photosPreview"></div>

            <div class="button-group">
                <button class="btn-identify" id="identifyBtn" disabled>Identify Fossil</button>
                <button class="btn-clear" id="clearBtn">Clear Photos</button>
            </div>
        </div>

        <div id="resultContainer"></div>
    </div>

    <script>
        // ===== LOGIN CHECK =====
        function checkLoginStatus() {
            const userId = localStorage.getItem('ammonite_user_id');
            const loginModal = document.getElementById('loginModal');
            const uploadBox = document.getElementById('uploadBox');
            const identifyBtn = document.getElementById('identifyBtn');
            
            if (!userId) {
                // NOT LOGGED IN - Show modal and disable upload
                loginModal.classList.add('show');
                uploadBox.style.pointerEvents = 'none';
                uploadBox.style.opacity = '0.5';
                identifyBtn.disabled = true;
            } else {
                // LOGGED IN - Hide modal and enable upload
                loginModal.classList.remove('show');
                uploadBox.style.pointerEvents = 'auto';
                uploadBox.style.opacity = '1';
                identifyBtn.disabled = true; // Still disabled until photos selected
            }
        }

        // Check login status on page load
        window.addEventListener('load', checkLoginStatus);
        // Also check when storage changes (user logs in/out)
        window.addEventListener('storage', checkLoginStatus);

        // ===== FILE UPLOAD HANDLING =====
        const uploadBox = document.getElementById('uploadBox');
        const photoInput = document.getElementById('photoInput');
        const photosPreview = document.getElementById('photosPreview');
        const identifyBtn = document.getElementById('identifyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const resultContainer = document.getElementById('resultContainer');

        let selectedFiles = [];

        uploadBox.addEventListener('click', () => photoInput.click());

        uploadBox.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadBox.classList.add('drag-over');
        });

        uploadBox.addEventListener('dragleave', () => {
            uploadBox.classList.remove('drag-over');
        });

        uploadBox.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadBox.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        });

        photoInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            selectedFiles = Array.from(files).slice(0, 3);
            displayPhotos();
        }

        function displayPhotos() {
            photosPreview.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const div = document.createElement('div');
                    div.className = 'photo-item';
                    div.innerHTML = `
                        <img src="${e.target.result}" alt="Photo ${index + 1}">
                        <button class="photo-remove" onclick="removePhoto(${index})">✕</button>
                    `;
                    photosPreview.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
            identifyBtn.disabled = selectedFiles.length === 0;
        }

        function removePhoto(index) {
            selectedFiles.splice(index, 1);
            displayPhotos();
        }

        clearBtn.addEventListener('click', () => {
            selectedFiles = [];
            photoInput.value = '';
            displayPhotos();
            resultContainer.innerHTML = '';
        });

        identifyBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;

            const userId = localStorage.getItem('ammonite_user_id');
            
            // Double-check user is logged in
            if (!userId) {
                document.getElementById('loginModal').classList.add('show');
                return;
            }

            identifyBtn.disabled = true;
            resultContainer.innerHTML = '<div class="loading"><div class="spinner"></div><p>Identifying your fossil...</p></div>';

            try {
                const formData = new FormData();
                selectedFiles.forEach(file => {
                    formData.append('photos', file);
                });
                formData.append('user_id', userId);

                const response = await fetch('/identify', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const result = await response.json();

                // Display result
                let html = '<div class="result">';
                html += '<h2>Identification Result</h2>';
                html += `<div class="result-item"><span class="result-label">Scenario:</span><span class="result-value">${result.scenario}</span></div>`;
                
                if (result.top_family) {
                    html += `<div class="result-item"><span class="result-label">Family:</span><span class="result-value">${result.top_family}</span></div>`;
                    html += `<div class="result-item"><span class="result-label">Confidence:</span><span class="result-value">${result.family_confidence}%</span></div>`;
                }

                if (result.genus_breakdown && result.genus_breakdown.length > 0) {
                    html += '<div class="result-item"><span class="result-label">Genus Breakdown:</span>';
                    result.genus_breakdown.forEach(g => {
                        html += `<div style="margin-left: 10px; margin-top: 5px;">${g.genus}: ${g.percentage}%</div>`;
                    });
                    html += '</div>';
                }

                html += `<div class="result-item"><span class="result-label">Details:</span><span class="result-value">${result.formatted_output}</span></div>`;
                html += '</div>';

                resultContainer.innerHTML = html;

            } catch (error) {
                resultContainer.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            } finally {
                identifyBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
